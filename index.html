<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clear Sky Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ccc;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
}
#app { display: flex; height: 100vh; }
#sidebar {
  width: 300px;
  background: rgba(8, 8, 20, 0.95);
  padding: 20px;
  overflow-y: auto;
  border-right: 1px solid #222;
  flex-shrink: 0;
  z-index: 10;
}
#sidebar h1 {
  font-size: 1.3em;
  color: #7eb8ff;
  margin-bottom: 4px;
}
#sidebar .subtitle {
  font-size: 0.8em;
  color: #667;
  margin-bottom: 18px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 0.8em;
  color: #889;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.field input {
  width: 100%;
  padding: 8px 10px;
  background: #0d0d20;
  border: 1px solid #333;
  color: #ddd;
  border-radius: 6px;
  font-size: 0.95em;
}
.field input:focus {
  outline: none;
  border-color: #4488cc;
}
button {
  padding: 8px 14px;
  background: #1a2a4c;
  color: #aac;
  border: 1px solid #2a3a5c;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85em;
  transition: background 0.2s;
}
button:hover { background: #2a3a6c; }
.btn-primary {
  background: #1a44aa;
  color: #fff;
  border-color: #2255bb;
}
.btn-primary:hover { background: #2a55cc; }
.btn-live-active { background: #1a6b2a !important; border-color: #2a9b3a !important; color: #8f8 !important; }
.btn-live-active:hover { background: #1a8b3a !important; }
.btn-row { display: flex; gap: 6px; margin-bottom: 14px; }
.section {
  border-top: 1px solid #1a1a2a;
  padding-top: 14px;
  margin-top: 14px;
}
.section h3 {
  font-size: 0.85em;
  color: #558;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 0.9em;
  cursor: pointer;
}
.toggle input { accent-color: #4488cc; }
#citySuggestions {
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  background: #0d0d20;
  border: 1px solid #333;
  border-top: none;
  border-radius: 0 0 6px 6px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}
#citySuggestions .sg-item {
  padding: 7px 10px;
  cursor: pointer;
  font-size: 0.88em;
  color: #ccc;
  border-bottom: 1px solid #1a1a2a;
}
#citySuggestions .sg-item:hover,
#citySuggestions .sg-item.active {
  background: #1a2a4c;
  color: #fff;
}
#citySuggestions .sg-item .sg-region {
  color: #667;
  font-size: 0.85em;
}
#moonInfo {
  background: #0a0a1e;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
  font-size: 0.85em;
  line-height: 1.6;
}
#moonInfo .phase-icon {
  font-size: 1.5em;
  margin-right: 6px;
}
#canvasWrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}
#canvasWrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
#glCanvas { z-index: 1; }
#overlayCanvas { z-index: 2; }
#tooltip {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  background: rgba(5, 5, 20, 0.92);
  color: #dde;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 0.8em;
  display: none;
  border: 1px solid #335;
  white-space: nowrap;
}
#viewInfo {
  position: absolute;
  z-index: 10;
  top: 12px;
  right: 16px;
  font-size: 0.75em;
  color: #556;
  text-align: right;
  pointer-events: none;
  line-height: 1.5;
}
#loadingMsg {
  position: absolute;
  z-index: 20;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #558;
  font-size: 1.1em;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>Clear Sky Viewer</h1>
    <div class="subtitle">Realistic night sky simulation</div>

    <div class="field" style="position:relative">
      <label>Location</label>
      <input type="text" id="cityInput" placeholder="Type a city name..." autocomplete="off" value="Ann Arbor, MI, US" />
      <div id="citySuggestions"></div>
    </div>
    <input type="hidden" id="lat" value="42.28" />
    <input type="hidden" id="lon" value="-83.74" />
    <div id="coordDisplay" style="font-size:0.75em;color:#667;margin:-8px 0 10px 0"></div>
    <div class="btn-row">
      <button onclick="useMyLocation()" class="btn-primary">Use My Location</button>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="field">
      <label>Time (local)</label>
      <input type="time" id="timeInput" step="60" />
    </div>
    <div class="btn-row">
      <button onclick="useNow()">Now</button>
      <button id="liveBtn" onclick="toggleLive()">Live</button>
      <button onclick="updateSky()" class="btn-primary">Update Sky</button>
    </div>

    <div class="section">
      <h3>View</h3>
      <div class="field">
        <label>Display Gamma</label>
        <input type="range" id="gammaSlider" min="0.85" max="1.25" step="0.05" value="1.0" oninput="renderAll()" />
      </div>
      <div class="field">
        <label>Light Pollution — <span id="bortleLabel">Bortle 2: Typical dark site</span></label>
        <input type="range" id="lpSlider" min="1" max="9" step="1" value="2" oninput="updateBortle(); updateSky()" />
      </div>
      <label class="toggle"><input type="checkbox" id="showConst" checked onchange="renderOverlay()" /> Constellation lines</label>
      <label class="toggle"><input type="checkbox" id="showLabels" checked onchange="renderOverlay()" /> Star labels</label>
      <label class="toggle"><input type="checkbox" id="showGrid" onchange="renderOverlay()" /> Alt/Az grid</label>
    </div>

    <div class="section">
      <h3>Moon</h3>
      <div id="moonInfo">Loading...</div>
    </div>

    <div class="section" style="font-size:0.75em;color:#445;line-height:1.5">
      <b>Controls:</b> Drag to pan. Scroll to zoom. Hover stars for info.
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="glCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <div id="tooltip"></div>
    <div id="viewInfo"></div>
    <div id="loadingMsg">Loading sky map...</div>
  </div>
</div>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos;
varying vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision highp float;

varying vec2 vUV;
uniform sampler2D uSkyTex;
uniform mat3 uViewToGal;
uniform float uFovTan;
uniform float uAspect;
uniform float uGamma;
uniform float uLightPollution;
uniform mat3 uCamToENU;

const float PI = 3.14159265359;

void main() {
  float px = (vUV.x - 0.5) * 2.0 * uFovTan * uAspect;
  float py = (vUV.y - 0.5) * 2.0 * uFovTan;

  vec3 camDir = normalize(vec3(px, py, 1.0));
  vec3 galDir = normalize(uViewToGal * camDir);

  float l = atan(galDir.y, galDir.x);
  if (l < 0.0) l += 2.0 * PI;
  float b = asin(clamp(galDir.z, -1.0, 1.0));

  vec2 texUV = vec2(l / (2.0 * PI), 0.5 - b / PI);
  vec3 milky = texture2D(uSkyTex, texUV).rgb;

  vec3 enuDir = normalize(uCamToENU * camDir);
  float sinAlt = enuDir.z;
  float altDeg = asin(clamp(sinAlt, -1.0, 1.0)) * (180.0 / PI);

  vec3 baseSky = vec3(0.012, 0.016, 0.024);
  float galLat = abs(b);
  float galMask = exp(-galLat * 3.2);
  float mwLuma = dot(milky, vec3(0.299, 0.587, 0.114));
  float mwStrength = smoothstep(0.16, 0.75, mwLuma);

  // Milky Way fades: full at Bortle 1-3, fading 4-6, gone by Bortle 7+
  float mwFade = 1.0 - smoothstep(0.25, 0.72, uLightPollution);
  vec3 skyColor = baseSky + milky * mwStrength * galMask * 0.30 * mwFade;

  // Natural sky: darker near horizon, atmospheric extinction
  float zenithFade = smoothstep(0.0, 55.0, altDeg);
  skyColor = mix(skyColor, baseSky, (1.0 - zenithFade) * 0.22);
  float airmass = 1.0 / max(0.14, max(sinAlt, 0.03));
  float ext = exp(-0.11 * max(0.0, airmass - 1.0));
  skyColor *= mix(1.0, ext, 0.42);

  // --- Light pollution effects (Bortle scale) ---
  float lp = uLightPollution;
  float lp2 = lp * lp;

  // 1. Skyglow: diffuse brightness across entire sky, altitude-dependent
  //    Stronger near horizon, but even zenith gets brighter at high Bortle
  float altGlow = 0.25 + 0.75 * pow(clamp(1.0 - max(sinAlt, 0.0), 0.0, 1.0), 1.4);
  vec3 skyGlow = vec3(0.20, 0.16, 0.10) * lp2 * altGlow * 0.9;
  skyColor += skyGlow;

  // 2. Horizon light dome: warm concentrated glow near horizon
  float horizonGlow = pow(clamp(1.0 - max(sinAlt, 0.0), 0.0, 1.0), 2.0);
  vec3 cityGlow = vec3(0.55, 0.38, 0.18) * horizonGlow * lp2 * 0.85;
  skyColor += cityGlow;

  // 3. Desaturation: LP washes out color contrast
  float luma = dot(skyColor, vec3(0.299, 0.587, 0.114));
  vec3 gray = vec3(luma);
  skyColor = mix(skyColor, gray, lp * 0.50);

  // 4. At very high LP, push the whole sky toward a bright gray-orange wash
  vec3 urbanSky = vec3(0.18, 0.15, 0.12) * lp;
  skyColor = mix(skyColor, urbanSky, lp2 * 0.55);

  float horizonMask = smoothstep(-8.0, 3.0, altDeg);
  skyColor *= horizonMask;

  skyColor = pow(clamp(skyColor, 0.0, 1.0), vec3(uGamma));

  gl_FragColor = vec4(clamp(skyColor, 0.0, 1.0), 1.0);
}
</script>

const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const PI = Math.PI;
const TAU = 2 * Math.PI;

function generateSyntheticCatalog(count = 9000) {
  const stars = [];
  let seed = 24681357;

  function rand() {
    seed = (1664525 * seed + 1013904223) >>> 0;
    return seed / 4294967296;
  }

  for (let i = 0; i < count; i++) {
    const u = rand();
    const v = rand();

    const ra = u * 360.0;
    const dec = Math.asin(v * 2.0 - 1.0) * RAD;

    const magBase = Math.pow(rand(), 1.85);
    const mag = 2.4 + magBase * 4.2;

    let bv;
    const c = rand();
    if (c < 0.18) bv = -0.1 + rand() * 0.25;
    else if (c < 0.58) bv = 0.15 + rand() * 0.45;
    else if (c < 0.85) bv = 0.6 + rand() * 0.55;
    else bv = 1.15 + rand() * 0.45;

    stars.push([ra, dec, mag, bv, ""]);
  }

  return stars;
}

const FULL_CATALOG = CATALOG.concat(generateSyntheticCatalog());

function julianDate(y, m, d, ut) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + ut / 24 + B - 1524.5;
}

function gmst(jd) {
  const T = (jd - 2451545) / 36525;
  return (280.46061837 + 360.98564736629 * (jd - 2451545) + 0.000387933 * T * T - T * T * T / 38710000 + 360000.0) % 360;
}

function raDecToAltAz(ra, dec, lat, lon, jd) {
  const lst = (gmst(jd) + lon + 360) % 360;
  const ha = (lst - ra + 360) % 360;
  const h = ha * DEG;
  const d = dec * DEG;
  const p = lat * DEG;
  const sinA = Math.sin(d) * Math.sin(p) + Math.cos(d) * Math.cos(p) * Math.cos(h);
  const alt = Math.asin(sinA);
  const cosA = Math.cos(alt);
  if (cosA < 1e-10) return { alt: alt * RAD, az: 0 };
  const az = Math.atan2(
    -Math.cos(d) * Math.sin(h) / cosA,
    (Math.sin(d) * Math.cos(p) - Math.cos(d) * Math.sin(p) * Math.cos(h)) / cosA
  );
  return { alt: alt * RAD, az: ((az * RAD) + 360) % 360 };
}

function atmosphericExtinction(alt, mag) {
  if (alt <= 0) return 99;
  return mag + 0.20 / Math.sin(Math.max(alt, 1) * DEG);
}

// Bortle class descriptions and limiting magnitudes (real data)
const BORTLE_INFO = [
  null, // index 0 unused
  { mag: 7.8, desc: 'Excellent dark site' },
  { mag: 7.3, desc: 'Typical dark site' },
  { mag: 6.8, desc: 'Rural sky' },
  { mag: 6.3, desc: 'Rural/suburban transition' },
  { mag: 5.8, desc: 'Suburban sky' },
  { mag: 5.3, desc: 'Bright suburban' },
  { mag: 4.8, desc: 'Suburban/urban transition' },
  { mag: 4.2, desc: 'City sky' },
  { mag: 3.5, desc: 'Inner-city sky' }
];

function getBortle() { return +document.getElementById('lpSlider').value; }
function bortleToLP(bortle) { return (bortle - 1) / 8; }

function updateBortle() {
  const b = getBortle();
  document.getElementById('bortleLabel').textContent =
    'Bortle ' + b + ': ' + BORTLE_INFO[b].desc;
}

function limitingMagnitude(lp) {
  // Interpolate between Bortle class limiting magnitudes
  const bortle = 1 + lp * 8;
  const lo = Math.max(1, Math.min(9, Math.floor(bortle)));
  const hi = Math.min(9, lo + 1);
  const t = bortle - lo;
  return BORTLE_INFO[lo].mag * (1 - t) + BORTLE_INFO[hi].mag * t;
}

function starVisibilityFactor(altDeg, lp) {
  const altFactor = Math.max(0.18, Math.min(1.0, altDeg / 35.0));
  const horizonPenalty = 1.0 - altFactor;
  // More aggressive dimming: stars near horizon fade much faster with LP
  return Math.max(0.02, 1.0 - lp * (1.6 - 0.8 * altFactor) - horizonPenalty * lp * 0.5);
}

function moonPosition(jd) {
  const T = (jd - 2451545) / 36525;
  let Lp = 218.3165 + 481267.8813 * T;
  let D = 297.8502 + 445267.1115 * T;
  let M = 357.5291 + 35999.0503 * T;
  let Mp = 134.9634 + 477198.8676 * T;
  let F = 93.2720 + 483202.0175 * T;
  [Lp, D, M, Mp, F] = [Lp, D, M, Mp, F].map(v => ((v % 360) + 360) % 360);
  const lon = Lp + 6.289 * Math.sin(Mp * DEG) + 1.274 * Math.sin((2 * D - Mp) * DEG) + 0.658 * Math.sin(2 * D * DEG) + 0.214 * Math.sin(2 * Mp * DEG) - 0.186 * Math.sin(M * DEG);
  const lat = 5.128 * Math.sin(F * DEG) + 0.281 * Math.sin((Mp + F) * DEG) + 0.278 * Math.sin((Mp - F) * DEG);
  const obl = (23.4393 - 0.013 * T) * DEG;
  const lonR = lon * DEG;
  const latR = lat * DEG;
  const ra = Math.atan2(Math.sin(lonR) * Math.cos(obl) - Math.tan(latR) * Math.sin(obl), Math.cos(lonR));
  const dec = Math.asin(Math.sin(latR) * Math.cos(obl) + Math.cos(latR) * Math.sin(obl) * Math.sin(lonR));
  return { ra: ((ra * RAD) + 360) % 360, dec: dec * RAD, eclLon: lon };
}

function sunPosition(jd) {
  const T = (jd - 2451545) / 36525;
  const M = (357.5291 + 35999.0503 * T) * DEG;
  const C = (1.9146 * Math.sin(M) + 0.02 * Math.sin(2 * M)) * DEG;
  const lon = (280.4665 + 36000.7698 * T) * DEG + C;
  const obl = (23.4393 - 0.013 * T) * DEG;
  const ra = Math.atan2(Math.cos(obl) * Math.sin(lon), Math.cos(lon));
  const dec = Math.asin(Math.sin(obl) * Math.sin(lon));
  return { ra: ((ra * RAD) + 360) % 360, dec: dec * RAD, eclLon: (lon * RAD + 360) % 360 };
}

function moonPhaseInfo(jd) {
  const moon = moonPosition(jd);
  const sun = sunPosition(jd);
  let elong = ((moon.eclLon - sun.eclLon) % 360 + 360) % 360;
  const illum = (1 + Math.cos((180 - elong) * DEG)) / 2;
  const names = ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent","New Moon"];
  const thresholds = [22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5,361];
  let idx = thresholds.findIndex(t => elong < t);
  return { illumination: illum, phaseName: names[idx], elongation: elong, moonRA: moon.ra, moonDec: moon.dec };
}

const R_EQ2GAL = [
  -0.0548755604, -0.8734370902, -0.4838350155,
   0.4941094279, -0.4448296300,  0.7469822445,
  -0.8676661490, -0.1980763734,  0.4559837762
];

function mat3Multiply(A, B) {
  const r = new Float32Array(9);
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      r[i * 3 + j] = A[i * 3] * B[j] + A[i * 3 + 1] * B[3 + j] + A[i * 3 + 2] * B[6 + j];
    }
  }
  return r;
}

function buildViewToGalMatrix(centerAlt, centerAz, latDeg, lonDeg, jd) {
  const lst = (gmst(jd) + lonDeg + 360) % 360;
  const lstR = lst * DEG;
  const latR = latDeg * DEG;
  const sinLst = Math.sin(lstR), cosLst = Math.cos(lstR);
  const sinLat = Math.sin(latR), cosLat = Math.cos(latR);

  const R_enu2eq = [
    -sinLst, -sinLat * cosLst, cosLat * cosLst,
     cosLst, -sinLat * sinLst, cosLat * sinLst,
     0,       cosLat,          sinLat
  ];

  const a0 = centerAlt * DEG, az0 = centerAz * DEG;
  const sinA = Math.sin(a0), cosA = Math.cos(a0);
  const sinAz = Math.sin(az0), cosAz = Math.cos(az0);

  const R_cam2enu = [
    cosAz,  -sinA * sinAz,  cosA * sinAz,
   -sinAz,  -sinA * cosAz,  cosA * cosAz,
    0,       cosA,          sinA
  ];

  const R_enu2gal = mat3Multiply(R_EQ2GAL, R_enu2eq);
  return mat3Multiply(R_enu2gal, R_cam2enu);
}

function buildCamToENUMatrix(centerAlt, centerAz) {
  const a0 = centerAlt * DEG, az0 = centerAz * DEG;
  const sinA = Math.sin(a0), cosA = Math.cos(a0);
  const sinAz = Math.sin(az0), cosAz = Math.cos(az0);
  return [
    cosAz,  -sinA * sinAz,  cosA * sinAz,
   -sinAz,  -sinA * cosAz,  cosA * cosAz,
    0,       cosA,          sinA
  ];
}

    console.error('Shader compile error:', gl.getShaderInfoLog(s));

  return s;
}

function project(altDeg, azDeg) {
  const a = altDeg * DEG, az = azDeg * DEG;
  const ca0 = view.centerAlt * DEG, az0 = view.centerAz * DEG;
  const cosA = Math.cos(a), sinA = Math.sin(a), cosAz = Math.cos(az), sinAz = Math.sin(az);
  const cosC = Math.cos(ca0), sinC = Math.sin(ca0), cosAz0 = Math.cos(az0), sinAz0 = Math.sin(az0);

  const x = cosA * sinAz, y = cosA * cosAz, z = sinA;
  const cx0 = cosC * sinAz0, cy0 = cosC * cosAz0, cz0 = sinC;
  const rx = cosAz0, ry = -sinAz0;
  const ux = -sinC * sinAz0, uy = -sinC * cosAz0, uz = cosC;

  const d = x * cx0 + y * cy0 + z * cz0;
  if (d <= 0.01) return null;

  const scale = view.radius / Math.tan(view.fov / 2 * DEG);
  const px = (x * rx + y * ry) / d * scale;
  const py = -(x * ux + y * uy + z * uz) / d * scale;
  if (Math.abs(px) > view.radius * 1.15 || Math.abs(py) > view.radius * 1.15) return null;
  return { x: view.cx + px, y: view.cy + py };
}

function computePositions() {
  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  const dateStr = document.getElementById('dateInput').value;
  const timeStr = document.getElementById('timeInput').value;
  if (!dateStr || !timeStr) return;

  const dt = new Date(dateStr + 'T' + timeStr);
  const utH = dt.getUTCHours() + dt.getUTCMinutes() / 60 + dt.getUTCSeconds() / 3600;
  currentJD = julianDate(dt.getUTCFullYear(), dt.getUTCMonth() + 1, dt.getUTCDate(), utH);

  computedStars = [];
  for (const s of FULL_CATALOG) {
    const p = raDecToAltAz(s[0], s[1], lat, lon, currentJD);
    if (p.alt < -2) continue;
    const am = atmosphericExtinction(p.alt, s[2]);
    if (am > 7.5) continue;
    computedStars.push({
      alt: p.alt,
      az: p.az,
      mag: s[2],
      appMag: am,
      bv: s[3],
      name: s[4],
      ra: s[0],
      dec: s[1]
    });
  }

  const moon = moonPosition(currentJD);
  const mp = raDecToAltAz(moon.ra, moon.dec, lat, lon, currentJD);
  computedMoon = { ...mp, ...moon };
  currentMoonPhase = moonPhaseInfo(currentJD);
  updateMoonPanel();
}

function updateMoonPanel() {
  const el = document.getElementById('moonInfo');
  if (!currentMoonPhase || !computedMoon) {
    el.textContent = 'N/A';
    return;
  }
  const icons = {
    'New Moon':'🌑','Waxing Crescent':'🌒','First Quarter':'🌓','Waxing Gibbous':'🌔',
    'Full Moon':'🌕','Waning Gibbous':'🌖','Last Quarter':'🌗','Waning Crescent':'🌘'
  };
  const ic = icons[currentMoonPhase.phaseName] || '';
  const il = (currentMoonPhase.illumination * 100).toFixed(1);
  const pos = computedMoon.alt > 0
    ? `Alt ${computedMoon.alt.toFixed(1)}° Az ${computedMoon.az.toFixed(1)}°`
    : 'Below horizon';
  el.innerHTML = `<span class="phase-icon">${ic}</span><b>${currentMoonPhase.phaseName}</b><br>Illumination: ${il}%<br>${pos}`;
}

function renderBackground() {
  if (!textureLoaded) return;
  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  const gamma = +document.getElementById('gammaSlider').value;
  const lp = bortleToLP(getBortle());
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;

  const M = buildViewToGalMatrix(view.centerAlt, view.centerAz, lat, lon, currentJD);

  gl.useProgram(program);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, skyTexture);
  gl.uniform1i(uSkyTex, 0);

  gl.uniformMatrix3fv(uViewToGal, false, [
    M[0], M[3], M[6],
    M[1], M[4], M[7],
    M[2], M[5], M[8]
  ]);

  gl.uniform1f(uFovTan, Math.tan(view.fov / 2 * DEG));
  gl.uniform1f(uAspect, w / h);
  gl.uniform1f(uGamma, gamma);
  gl.uniform1f(uLightPollution, lp);

  const C2E = buildCamToENUMatrix(view.centerAlt, view.centerAz);
  gl.uniformMatrix3fv(uCamToENU, false, [
    C2E[0], C2E[3], C2E[6],
    C2E[1], C2E[4], C2E[7],
    C2E[2], C2E[5], C2E[8]
  ]);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function bvToRGB(bv) {
  bv = Math.max(-0.4, Math.min(2.0, bv));
  let r, g, b;
  if (bv < 0) {
    r = 0.7 + bv * 0.15; g = 0.75 + bv * 0.1; b = 1.0;
  } else if (bv < 0.4) {
    r = 0.85 + bv * 0.38; g = 0.88 + bv * 0.2; b = 1.0 - bv * 0.35;
  } else if (bv < 0.8) {
    r = 1.0; g = 1.0 - (bv - 0.4) * 0.5; b = 0.86 - (bv - 0.4) * 0.7;
  } else if (bv < 1.4) {
    r = 1.0; g = 0.8 - (bv - 0.8) * 0.4; b = 0.58 - (bv - 0.8) * 0.5;
  } else {
    r = 1.0; g = Math.max(0.3, 0.56 - (bv - 1.4) * 0.25); b = Math.max(0.1, 0.28 - (bv - 1.4) * 0.15);
  }
  return [Math.min(1, r), Math.min(1, g), Math.min(1, b)];
}

function renderOverlay() {
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const showConst = document.getElementById('showConst').checked;
  const showLabels = document.getElementById('showLabels').checked;
  const showGrid = document.getElementById('showGrid').checked;
  const lp = bortleToLP(getBortle());
  const mLim = limitingMagnitude(lp);

  if (showGrid) {
    ctx.strokeStyle = 'rgba(60,70,100,0.2)';
    ctx.lineWidth = 0.5;
    for (let alt = 0; alt <= 90; alt += 15) {
      ctx.beginPath();
      let first = true;
      for (let az = 0; az <= 360; az += 2) {
        const p = project(alt, az);
        if (!p) { first = true; continue; }
        if (first) { ctx.moveTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    for (let az = 0; az < 360; az += 30) {
      ctx.beginPath();
      let first = true;
      for (let alt = 0; alt <= 90; alt += 2) {
        const p = project(alt, az);
        if (!p) { first = true; continue; }
        if (first) { ctx.moveTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }

  if (showConst) {
    ctx.strokeStyle = `rgba(90,130,200,${0.25 * Math.max(0, 1.0 - lp * 1.2)})`;
    ctx.lineWidth = 0.8;
    for (const [name, lines] of Object.entries(CONST_LINES)) {
      let sx = 0, sy = 0, sc = 0;
      for (const [n1, n2] of lines) {
        const s1 = computedStars.find(s => s.name === n1);
        const s2 = computedStars.find(s => s.name === n2);
        if (!s1 || !s2 || s1.alt < 0 || s2.alt < 0) continue;
        const p1 = project(s1.alt, s1.az);
        const p2 = project(s2.alt, s2.az);
        if (!p1 || !p2) continue;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
        sx += p1.x + p2.x;
        sy += p1.y + p2.y;
        sc += 2;
      }
      if (showLabels && sc > 0) {
        ctx.fillStyle = 'rgba(100,140,200,0.25)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(name, sx / sc, sy / sc - 8);
      }
    }
  }

  ctx.strokeStyle = 'rgba(60,80,50,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  let hf = true;
  for (let az = 0; az <= 361; az++) {
    const p = project(0, az % 360);
    if (!p) { hf = true; continue; }
    if (hf) { ctx.moveTo(p.x, p.y); hf = false; }
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  for (const star of computedStars) {
    if (star.alt < 0) continue;

    const visFactor = starVisibilityFactor(star.alt, lp);
    const effectiveMag = star.appMag + (1.0 - visFactor) * 3.0 + lp * 0.5;
    if (effectiveMag > mLim) continue;

    const p = project(star.alt, star.az);
    if (!p) continue;

    const am = effectiveMag;
    const isNamed = !!star.name;
    const size = isNamed
        ? Math.max(0.5, 4.3 - am * 0.50 - lp * 0.6)
        : Math.max(0.18, 2.10 - am * 0.22 - lp * 0.3);
    const bright = isNamed
        ? Math.max(0.08, Math.min(1, Math.pow(10, -0.17 * (am + 0.35)) * (1.0 - lp * 0.40)))
        : Math.max(0.04, Math.min(0.78, Math.pow(10, -0.18 * (am + 0.25)) * (1.0 - lp * 0.40)));
    const [r, g, b] = bvToRGB(star.bv);

    // Glow halo only at low LP (disappears by Bortle 6)
    if (isNamed && am < 2.4 && lp < 0.55) {
      const gs = size * (3.2 - lp * 2.5);
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gs);
      grd.addColorStop(0, `rgba(${r*255|0},${g*255|0},${b*255|0},${bright * Math.max(0.04, 0.22 - lp * 0.20)})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, gs, 0, TAU);
      ctx.fill();
    }

    ctx.fillStyle = `rgba(${r*bright*255|0},${g*bright*255|0},${b*bright*255|0},${isNamed ? Math.min(1, bright + 0.12) : Math.min(0.92, bright + 0.10)})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, TAU);
    ctx.fill();

    if (showLabels && star.name && effectiveMag < 2.0 && lp < 0.85) {
      ctx.fillStyle = `rgba(190,210,240,${Math.min(0.70, bright * 0.85 * (1.0 - lp * 0.6))})`;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(star.name, p.x + size + 3, p.y + 3);
    }
  }

  if (computedMoon && computedMoon.alt > -1 && currentMoonPhase) {
    const p = project(computedMoon.alt, computedMoon.az);
    if (p) {
      const mr = Math.max(8, 16 - view.fov * 0.07);
      const il = currentMoonPhase.illumination;
      const el = currentMoonPhase.elongation;
      const gr = mr * 4;
      const grd = ctx.createRadialGradient(p.x, p.y, mr * 0.3, p.x, p.y, gr);
      grd.addColorStop(0, `rgba(200,215,240,${il * 0.25})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, gr, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#1a1a28';
      ctx.beginPath();
      ctx.arc(p.x, p.y, mr, 0, TAU);
      ctx.fill();
      if (il > 0.01) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, mr, 0, TAU);
        ctx.clip();
        ctx.fillStyle = `rgb(${200 + il * 55 | 0}, ${210 + il * 45 | 0}, ${220 + il * 35 | 0})`;
        const tX = mr * Math.cos(el * DEG);
        ctx.beginPath();
        if (el < 180) {
          ctx.arc(p.x, p.y, mr, -PI / 2, PI / 2, false);
          ctx.ellipse(p.x, p.y, Math.abs(tX), mr, 0, PI / 2, -PI / 2, tX > 0);
        } else {
          ctx.arc(p.x, p.y, mr, PI / 2, -PI / 2, false);
          ctx.ellipse(p.x, p.y, Math.abs(tX), mr, 0, -PI / 2, PI / 2, tX > 0);
        }
        ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = 'rgba(200,215,240,0.5)';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Moon', p.x, p.y + mr + 14);
    }
  }

  const dirs = [[0,'N'],[45,'NE'],[90,'E'],[135,'SE'],[180,'S'],[225,'SW'],[270,'W'],[315,'NW']];
  for (const [az, label] of dirs) {
    const p = project(0, az);
    if (!p) continue;
    const main = label.length === 1;
    ctx.fillStyle = main ? 'rgba(200,180,100,0.65)' : 'rgba(150,140,80,0.35)';
    ctx.font = main ? 'bold 13px sans-serif' : '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, p.x, p.y + (main ? 20 : 16));
  }

  const dirN = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const di = Math.round(view.centerAz / 22.5) % 16;
  document.getElementById('viewInfo').innerHTML = `Looking: ${dirN[di]} (${view.centerAz.toFixed(0)}°)<br>Alt: ${view.centerAlt.toFixed(0)}° | FOV: ${view.fov.toFixed(0)}°`;
}

  const sens = view.fov / view.radius;
  view.centerAz = ((dragAz0 - (e.clientX - dragSX) * sens) + 360) % 360;
  view.centerAlt = Math.max(-5, Math.min(90, dragAlt0 + (e.clientY - dragSY) * sens));
  renderAll();
});

overlay.addEventListener('mousemove', e => {
  if (dragging) return;
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const tt = document.getElementById('tooltip');
  let best = null, bd = 15;
  const lp = bortleToLP(getBortle());
  for (const s of computedStars) {
    if (!s.name || s.alt < 0) continue;
    const eff = s.appMag + (1.0 - starVisibilityFactor(s.alt, lp)) * 3.0 + lp * 0.35;
    const p = project(s.alt, s.az);
    if (!p) continue;
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < bd) { best = { ...s, effectiveMag: eff }; bd = d; }
  }
  if (best) {
    tt.style.display = 'block';
    tt.style.left = (mx + 15) + 'px';
    tt.style.top = (my - 10) + 'px';
    tt.innerHTML = `<b>${best.name}</b><br>Mag ${best.mag.toFixed(2)} | App ${best.effectiveMag.toFixed(2)}<br>Alt ${best.alt.toFixed(1)}° Az ${best.az.toFixed(1)}°`;
  } else {
    tt.style.display = 'none';
  }
});

  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  document.getElementById('coordDisplay').textContent =
    `${Math.abs(lat).toFixed(2)}\u00b0${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon).toFixed(2)}\u00b0${lon >= 0 ? 'E' : 'W'}`;
}
updateCoordDisplay();

function searchCities(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase().trim();
  const parts = q.split(/[,\s]+/).filter(Boolean);
  const results = [];
  for (const c of CITY_DB) {
    const [city, region, country, lat, lon, tz] = c;
    const cl = city.toLowerCase();
    const rl = region.toLowerCase();
    const cntl = country.toLowerCase();
    let score = 0;
    if (parts.length === 1) {
      if (cl === q) score = 100;
      else if (cl.startsWith(q)) score = 80;
      else if (cl.includes(q)) score = 40;
      else continue;
    } else {
      const lastPart = parts[parts.length - 1];
      const joinedCity = parts.slice(0, -1).join(' ');
      const regionMatch = rl.startsWith(lastPart) || cntl === lastPart;
      const joinedMatch = cl.startsWith(joinedCity) || cl === joinedCity;
      const fullMatch = cl.startsWith(q) || cl === q;
      const cityMatch = cl.startsWith(parts[0]);
      if (fullMatch) score = 90;
      else if (joinedMatch && regionMatch) score = 85;
      else if (cityMatch && regionMatch) score = 70;
      else if (cityMatch) score = 30;
      else continue;
    }
    const majorBonus = MAJOR_CITIES.get(cl + '|' + country);
    if (majorBonus) score += majorBonus;
    results.push({ city, region, country, lat, lon, tz, score });
    if (results.length > 50) break;
  }
  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 8);
}

function renderSuggestions(results) {
  if (results.length === 0) { sugBox.style.display = 'none'; return; }
  sgIdx = -1;
  sugBox.innerHTML = results.map((r, i) =>
    `<div class="sg-item" data-idx="${i}">${r.city} <span class="sg-region">${r.region ? r.region + ', ' : ''}${r.country}</span></div>`
  ).join('');
  sugBox.style.display = 'block';
  sugBox.querySelectorAll('.sg-item').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); selectCity(results[+el.dataset.idx]); });
  });
}

// Set the date/time inputs to the current time in a given IANA timezone
function setLocalTime(tz) {
  try {
    const now = new Date();
    // Use individual toLocaleString calls with explicit hourCycle for max browser compat
    const y = now.toLocaleString('en-US', { timeZone: tz, year: 'numeric' });
    const m = now.toLocaleString('en-US', { timeZone: tz, month: '2-digit' });
    const d = now.toLocaleString('en-US', { timeZone: tz, day: '2-digit' });
    const h = now.toLocaleString('en-GB', { timeZone: tz, hour: '2-digit', hourCycle: 'h23' });
    const min = now.toLocaleString('en-US', { timeZone: tz, minute: '2-digit' });
    const dateVal = y + '-' + m + '-' + d;
    const timeVal = h.padStart(2, '0') + ':' + min.padStart(2, '0');
    document.getElementById('dateInput').value = dateVal;
    document.getElementById('timeInput').value = timeVal;
  } catch (e) {
    console.warn('setLocalTime failed for tz=' + tz, e);
  }
}

function selectCity(r) {
  document.getElementById('lat').value = r.lat;
  document.getElementById('lon').value = r.lon;
  cityInput.value = `${r.city}${r.region ? ', ' + r.region : ''}, ${r.country}`;
  sugBox.style.display = 'none';
  updateCoordDisplay();
  currentTZ = r.tz || null;
  if (currentTZ) setLocalTime(currentTZ);
  updateSky();
}

cityInput.addEventListener('input', () => renderSuggestions(searchCities(cityInput.value)));
cityInput.addEventListener('focus', () => { if (cityInput.value.length >= 2) renderSuggestions(searchCities(cityInput.value)); });
cityInput.addEventListener('blur', () => { setTimeout(() => { sugBox.style.display = 'none'; }, 150); });
cityInput.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('.sg-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); sgIdx = Math.min(sgIdx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('active', i === sgIdx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); sgIdx = Math.max(sgIdx - 1, 0); items.forEach((el, i) => el.classList.toggle('active', i === sgIdx)); }
  else if (e.key === 'Enter') { e.preventDefault(); const results = searchCities(cityInput.value); if (sgIdx >= 0 && results[sgIdx]) selectCity(results[sgIdx]); else if (results.length) selectCity(results[0]); }
});

function useMyLocation() {
  if (!navigator.geolocation) {
    alert('Geolocation not supported');
    return;
  }
  navigator.geolocation.getCurrentPosition(p => {
    const lat = p.coords.latitude;
    const lon = p.coords.longitude;
    document.getElementById('lat').value = lat.toFixed(4);
    document.getElementById('lon').value = lon.toFixed(4);
    let best = null, bestDist = Infinity;
    for (const c of CITY_DB) {
      const d = Math.pow(c[3] - lat, 2) + Math.pow(c[4] - lon, 2);
      if (d < bestDist) { bestDist = d; best = c; }
    }
    if (best && bestDist < 4) {
      cityInput.value = `${best[0]}${best[1] ? ', ' + best[1] : ''}, ${best[2]}`;
      currentTZ = best[5] || null;
      if (currentTZ) setLocalTime(currentTZ);
    } else {
      cityInput.value = `${lat.toFixed(2)}\u00b0${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon).toFixed(2)}\u00b0${lon >= 0 ? 'E' : 'W'}`;
      currentTZ = null;
    }
    updateCoordDisplay();
    updateSky();
  }, () => alert('Could not get location'));
}

let currentTZ = null; // IANA timezone of selected city (null = browser local)
let liveInterval = null;
let liveActive = false;

function useNow() {
  if (currentTZ) {
    setLocalTime(currentTZ);
  } else {
    const n = new Date();
    document.getElementById('dateInput').value = n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
    document.getElementById('timeInput').value = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  }
  updateSky();
}

function toggleLive() {
  liveActive = !liveActive;
  const btn = document.getElementById('liveBtn');
  const dateEl = document.getElementById('dateInput');
  const timeEl = document.getElementById('timeInput');
  if (liveActive) {
    btn.classList.add('btn-live-active');
    btn.textContent = 'Live \u25CF';
    dateEl.disabled = true;
    timeEl.disabled = true;
    useNow(); // sync immediately
    liveInterval = setInterval(() => {
      useNow();
    }, 30000); // update every 30 seconds
  } else {
    btn.classList.remove('btn-live-active');
    btn.textContent = 'Live';
    dateEl.disabled = false;
    timeEl.disabled = false;
    if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
  }
}

['dateInput','timeInput'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    // Manual time change disables Live mode
    if (liveActive) toggleLive();
    updateSky();
  });
});

function init() {
  useNow();
  updateBortle();
  resizeCanvases();
  window.addEventListener('resize', () => {
    resizeCanvases();
    renderAll();
  });
  updateSky();
}

init();
</script>
