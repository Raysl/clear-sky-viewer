<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clear Sky Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ccc;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
}
#app { display: flex; height: 100vh; }
#sidebar {
  width: 300px;
  background: rgba(8, 8, 20, 0.95);
  padding: 20px;
  overflow-y: auto;
  border-right: 1px solid #222;
  flex-shrink: 0;
  z-index: 10;
}
#sidebar h1 {
  font-size: 1.3em;
  color: #7eb8ff;
  margin-bottom: 4px;
}
#sidebar .subtitle {
  font-size: 0.8em;
  color: #667;
  margin-bottom: 18px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 0.8em;
  color: #889;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.field input {
  width: 100%;
  padding: 8px 10px;
  background: #0d0d20;
  border: 1px solid #333;
  color: #ddd;
  border-radius: 6px;
  font-size: 0.95em;
}
.field input:focus {
  outline: none;
  border-color: #4488cc;
}
button {
  padding: 8px 14px;
  background: #1a2a4c;
  color: #aac;
  border: 1px solid #2a3a5c;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85em;
  transition: background 0.2s;
}
button:hover { background: #2a3a6c; }
.btn-primary {
  background: #1a44aa;
  color: #fff;
  border-color: #2255bb;
}
.btn-primary:hover { background: #2a55cc; }
.btn-row { display: flex; gap: 6px; margin-bottom: 14px; }
.section {
  border-top: 1px solid #1a1a2a;
  padding-top: 14px;
  margin-top: 14px;
}
.section h3 {
  font-size: 0.85em;
  color: #558;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 0.9em;
  cursor: pointer;
}
.toggle input { accent-color: #4488cc; }
#citySuggestions {
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  background: #0d0d20;
  border: 1px solid #333;
  border-top: none;
  border-radius: 0 0 6px 6px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 100;
  display: none;
}
#citySuggestions .sg-item {
  padding: 7px 10px;
  cursor: pointer;
  font-size: 0.88em;
  color: #ccc;
  border-bottom: 1px solid #1a1a2a;
}
#citySuggestions .sg-item:hover,
#citySuggestions .sg-item.active {
  background: #1a2a4c;
  color: #fff;
}
#citySuggestions .sg-item .sg-region {
  color: #667;
  font-size: 0.85em;
}
#moonInfo {
  background: #0a0a1e;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
  font-size: 0.85em;
  line-height: 1.6;
}
#moonInfo .phase-icon {
  font-size: 1.5em;
  margin-right: 6px;
}
#canvasWrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}
#canvasWrap canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
#glCanvas { z-index: 1; }
#overlayCanvas { z-index: 2; }
#tooltip {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  background: rgba(5, 5, 20, 0.92);
  color: #dde;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 0.8em;
  display: none;
  border: 1px solid #335;
  white-space: nowrap;
}
#viewInfo {
  position: absolute;
  z-index: 10;
  top: 12px;
  right: 16px;
  font-size: 0.75em;
  color: #556;
  text-align: right;
  pointer-events: none;
  line-height: 1.5;
}
#loadingMsg {
  position: absolute;
  z-index: 20;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #558;
  font-size: 1.1em;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>Clear Sky Viewer</h1>
    <div class="subtitle">The sky without light pollution</div>

    <div class="field" style="position:relative">
      <label>Location</label>
      <input type="text" id="cityInput" placeholder="Type a city name..." autocomplete="off" value="Ann Arbor, MI, US" />
      <div id="citySuggestions"></div>
    </div>
    <input type="hidden" id="lat" value="42.28" />
    <input type="hidden" id="lon" value="-83.74" />
    <div id="coordDisplay" style="font-size:0.75em;color:#667;margin:-8px 0 10px 0"></div>
    <div class="btn-row">
      <button onclick="useMyLocation()" class="btn-primary">Use My Location</button>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="field">
      <label>Time (local)</label>
      <input type="time" id="timeInput" step="60" />
    </div>
    <div class="btn-row">
      <button onclick="useNow()">Now</button>
      <button onclick="updateSky()" class="btn-primary">Update Sky</button>
    </div>

    <div class="section">
      <h3>View</h3>
      <div class="field">
        <label>Display Gamma</label>
        <input type="range" id="gammaSlider" min="0.85" max="1.25" step="0.05" value="1.0" oninput="renderAll()" />
      </div>
      <div class="field">
        <label>Light Pollution</label>
        <input type="range" id="lpSlider" min="0.0" max="1.0" step="0.02" value="0.18" oninput="updateSky()" />
      </div>
      <label class="toggle"><input type="checkbox" id="showConst" checked onchange="renderOverlay()" /> Constellation lines</label>
      <label class="toggle"><input type="checkbox" id="showLabels" checked onchange="renderOverlay()" /> Star labels</label>
      <label class="toggle"><input type="checkbox" id="showGrid" onchange="renderOverlay()" /> Alt/Az grid</label>
    </div>

    <div class="section">
      <h3>Moon</h3>
      <div id="moonInfo">Loading...</div>
    </div>

    <div class="section" style="font-size:0.75em;color:#445;line-height:1.5">
      <b>Controls:</b> Drag to pan. Scroll to zoom. Hover stars for info.
    </div>
  </div>

  <div id="canvasWrap">
    <canvas id="glCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <div id="tooltip"></div>
    <div id="viewInfo"></div>
    <div id="loadingMsg">Loading sky map...</div>
  </div>
</div>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos;
varying vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision highp float;

varying vec2 vUV;
uniform sampler2D uSkyTex;
uniform mat3 uViewToGal;
uniform float uFovTan;
uniform float uAspect;
uniform float uGamma;
uniform float uLightPollution;
uniform mat3 uCamToENU;

const float PI = 3.14159265359;

// Simple pseudo-noise for subtle sky texture variation
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}
float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

void main() {
  float px = (vUV.x - 0.5) * 2.0 * uFovTan * uAspect;
  float py = (vUV.y - 0.5) * 2.0 * uFovTan;

  vec3 camDir = normalize(vec3(px, py, 1.0));
  vec3 galDir = normalize(uViewToGal * camDir);

  float l = atan(galDir.y, galDir.x);
  if (l < 0.0) l += 2.0 * PI;
  float b = asin(clamp(galDir.z, -1.0, 1.0));

  vec2 texUV = vec2(l / (2.0 * PI), 0.5 - b / PI);
  vec3 milky = texture2D(uSkyTex, texUV).rgb;

  vec3 enuDir = normalize(uCamToENU * camDir);
  float sinAlt = enuDir.z;
  float altDeg = asin(clamp(sinAlt, -1.0, 1.0)) * (180.0 / PI);

  // --- Dark sky base with subtle blue-violet tint ---
  vec3 baseSky = vec3(0.008, 0.010, 0.020);

  // --- Milky Way texture with contrast enhancement ---
  float mwLuma = dot(milky, vec3(0.299, 0.587, 0.114));
  // S-curve contrast: darken faint areas, brighten bright areas
  float contrast = smoothstep(0.02, 0.12, mwLuma);
  vec3 mw = milky * 1.3 * contrast;
  // Slight warm tint to brighter Milky Way regions (mimics dust-scattered starlight)
  mw += vec3(0.04, 0.02, 0.0) * mwLuma * contrast;

  vec3 skyColor = baseSky + mw;

  // --- Subtle sky noise to break up digital uniformity ---
  float n = noise(texUV * 800.0) * 0.008 - 0.004;
  skyColor += vec3(n * 0.6, n * 0.7, n);

  // --- Atmospheric extinction with realistic color shift ---
  // Rayleigh scattering removes blue light faster at low altitudes
  float airmass = 1.0 / max(0.14, max(sinAlt, 0.03));
  float extR = exp(-0.06 * max(0.0, airmass - 1.0));
  float extG = exp(-0.10 * max(0.0, airmass - 1.0));
  float extB = exp(-0.18 * max(0.0, airmass - 1.0));
  skyColor *= vec3(extR, extG, extB);

  // --- Airglow: subtle green-yellow band at ~10-25° altitude ---
  // Real phenomenon visible in very dark skies
  float airglowAlt = exp(-pow((altDeg - 15.0) / 12.0, 2.0));
  vec3 airglow = vec3(0.006, 0.010, 0.004) * airglowAlt * (1.0 - uLightPollution);
  skyColor += airglow;

  // --- Zenith brightening (sky is slightly brighter overhead in clean air) ---
  float zenithBoost = smoothstep(40.0, 85.0, altDeg) * 0.08;
  skyColor *= 1.0 + zenithBoost;

  // --- Horizon gradient: natural blue-to-dark transition ---
  float horizonDarken = smoothstep(0.0, 30.0, altDeg);
  skyColor = mix(skyColor * 0.4, skyColor, horizonDarken);

  // --- Light pollution effects ---
  float horizonGlow = pow(clamp(1.0 - max(sinAlt, 0.0), 0.0, 1.0), 1.8);
  // Warm sodium-lamp glow near horizon
  vec3 cityGlow = vec3(0.38, 0.26, 0.12) * horizonGlow * uLightPollution * 0.5;
  // Skyglow that washes out the entire sky
  vec3 skyGlow = vec3(0.12, 0.10, 0.08) * uLightPollution * 0.3;
  skyColor += cityGlow + skyGlow;

  // Desaturation from light pollution (washes out color)
  vec3 avg = vec3(dot(skyColor, vec3(0.299, 0.587, 0.114)));
  skyColor = mix(skyColor, avg, uLightPollution * 0.45);
  // Overall washout
  skyColor = mix(skyColor, vec3(0.14, 0.13, 0.12), uLightPollution * 0.55);

  // --- Below-horizon fade ---
  float horizonMask = smoothstep(-6.0, 2.0, altDeg);
  skyColor *= horizonMask;

  // --- Filmic tone mapping (more natural than simple gamma) ---
  // Attempt an Uncharted 2 style tone curve
  vec3 x = max(vec3(0.0), skyColor);
  // Lift shadows slightly, compress highlights
  x = (x * (6.2 * x + 0.5)) / (x * (6.2 * x + 1.7) + 0.06);
  // Apply gamma on top
  skyColor = pow(clamp(x, 0.0, 1.0), vec3(uGamma * 0.85));

  gl_FragColor = vec4(clamp(skyColor, 0.0, 1.0), 1.0);
}
</script>

<script>
// STAR_CATALOG loaded from star_catalog.js: ~8200 real stars to mag 6.5
// Format: [RA_deg, Dec_deg, Vmag, B-V, "Name"]
const FULL_CATALOG = STAR_CATALOG;

const CONST_LINES = {
  "Ursa Major":[["Dubhe","Merak"],["Merak","Phecda"],["Phecda","Megrez"],["Megrez","Alioth"],["Alioth","Mizar"],["Mizar","Alkaid"],["Megrez","Dubhe"]],
  "Orion":[["Betelgeuse","Bellatrix"],["Betelgeuse","Mintaka"],["Bellatrix","Mintaka"],["Mintaka","Alnilam"],["Alnilam","Alnitak"],["Alnitak","Saiph"],["Mintaka","Rigel"],["Rigel","Saiph"]],
  "Cassiopeia":[["Schedar","Caph"],["Schedar","Gamma Cas"],["Gamma Cas","Ruchbah"],["Ruchbah","Segin"]],
  "Cygnus":[["Deneb","Sadr"],["Sadr","Albireo"]],
  "Gemini":[["Pollux","Castor"],["Pollux","Alhena"]],
  "Leo":[["Regulus","Denebola"],["Regulus","Algieba"],["Algieba","Adhafera"],["Denebola","Zosma"],["Zosma","Algieba"]],
  "Taurus":[["Aldebaran","Elnath"],["Aldebaran","Alcyone"]],
  "Scorpius":[["Antares","Dschubba"],["Antares","Shaula"],["Antares","Wei"],["Shaula","Sargas"]],
  "Sagittarius":[["Kaus Australis","Nunki"],["Kaus Australis","Ascella"],["Kaus Australis","Kaus Media"],["Kaus Media","Kaus Borealis"]],
  "Canis Major":[["Sirius","Mirzam"],["Sirius","Adhara"],["Adhara","Wezen"],["Wezen","Aludra"]],
  "Crux":[["Acrux","Gacrux"],["Mimosa","Imai"]],
  "Centaurus":[["Alpha Centauri","Hadar"],["Hadar","Menkent"]],
  "Aquila":[["Altair","Tarazed"],["Altair","Alshain"]],
  "Pegasus":[["Markab","Scheat"],["Scheat","Alpheratz"],["Alpheratz","Algenib"],["Algenib","Markab"]],
  "Corvus":[["Gienah","Kraz"],["Kraz","Algorab"],["Algorab","Minkar"],["Minkar","Gienah"]],
  "Lyra":[["Vega","Sheliak"],["Sheliak","Sulafat"],["Sulafat","Vega"]],
  "Bootes":[["Arcturus","Muphrid"],["Arcturus","Nekkar"],["Nekkar","Seginus"]],
  "Cepheus":[["Alderamin","Alfirk"],["Alfirk","Er Rai"]]
};

const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const PI = Math.PI;
const TAU = 2 * Math.PI;

function julianDate(y, m, d, ut) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + ut / 24 + B - 1524.5;
}

function gmst(jd) {
  const T = (jd - 2451545) / 36525;
  return (280.46061837 + 360.98564736629 * (jd - 2451545) + 0.000387933 * T * T - T * T * T / 38710000 + 360000.0) % 360;
}

function raDecToAltAz(ra, dec, lat, lon, jd) {
  const lst = (gmst(jd) + lon + 360) % 360;
  const ha = (lst - ra + 360) % 360;
  const h = ha * DEG;
  const d = dec * DEG;
  const p = lat * DEG;
  const sinA = Math.sin(d) * Math.sin(p) + Math.cos(d) * Math.cos(p) * Math.cos(h);
  const alt = Math.asin(sinA);
  const cosA = Math.cos(alt);
  if (cosA < 1e-10) return { alt: alt * RAD, az: 0 };
  const az = Math.atan2(
    -Math.cos(d) * Math.sin(h) / cosA,
    (Math.sin(d) * Math.cos(p) - Math.cos(d) * Math.sin(p) * Math.cos(h)) / cosA
  );
  return { alt: alt * RAD, az: ((az * RAD) + 360) % 360 };
}

function atmosphericExtinction(alt, mag) {
  if (alt <= 0) return 99;
  return mag + 0.20 / Math.sin(Math.max(alt, 1) * DEG);
}

function limitingMagnitude(lp) {
  return 7.1 - lp * 4.8;
}

function starVisibilityFactor(altDeg, lp) {
  const altFactor = Math.max(0.18, Math.min(1.0, altDeg / 35.0));
  const horizonPenalty = 1.0 - altFactor;
  return Math.max(0.05, 1.0 - lp * (1.35 - 0.75 * altFactor) - horizonPenalty * lp * 0.35);
}

function moonPosition(jd) {
  const T = (jd - 2451545) / 36525;
  let Lp = 218.3165 + 481267.8813 * T;
  let D = 297.8502 + 445267.1115 * T;
  let M = 357.5291 + 35999.0503 * T;
  let Mp = 134.9634 + 477198.8676 * T;
  let F = 93.2720 + 483202.0175 * T;
  [Lp, D, M, Mp, F] = [Lp, D, M, Mp, F].map(v => ((v % 360) + 360) % 360);
  const lon = Lp + 6.289 * Math.sin(Mp * DEG) + 1.274 * Math.sin((2 * D - Mp) * DEG) + 0.658 * Math.sin(2 * D * DEG) + 0.214 * Math.sin(2 * Mp * DEG) - 0.186 * Math.sin(M * DEG);
  const lat = 5.128 * Math.sin(F * DEG) + 0.281 * Math.sin((Mp + F) * DEG) + 0.278 * Math.sin((Mp - F) * DEG);
  const obl = (23.4393 - 0.013 * T) * DEG;
  const lonR = lon * DEG;
  const latR = lat * DEG;
  const ra = Math.atan2(Math.sin(lonR) * Math.cos(obl) - Math.tan(latR) * Math.sin(obl), Math.cos(lonR));
  const dec = Math.asin(Math.sin(latR) * Math.cos(obl) + Math.cos(latR) * Math.sin(obl) * Math.sin(lonR));
  return { ra: ((ra * RAD) + 360) % 360, dec: dec * RAD, eclLon: lon };
}

function sunPosition(jd) {
  const T = (jd - 2451545) / 36525;
  const M = (357.5291 + 35999.0503 * T) * DEG;
  const C = (1.9146 * Math.sin(M) + 0.02 * Math.sin(2 * M)) * DEG;
  const lon = (280.4665 + 36000.7698 * T) * DEG + C;
  const obl = (23.4393 - 0.013 * T) * DEG;
  const ra = Math.atan2(Math.cos(obl) * Math.sin(lon), Math.cos(lon));
  const dec = Math.asin(Math.sin(obl) * Math.sin(lon));
  return { ra: ((ra * RAD) + 360) % 360, dec: dec * RAD, eclLon: (lon * RAD + 360) % 360 };
}

function moonPhaseInfo(jd) {
  const moon = moonPosition(jd);
  const sun = sunPosition(jd);
  let elong = ((moon.eclLon - sun.eclLon) % 360 + 360) % 360;
  const illum = (1 + Math.cos((180 - elong) * DEG)) / 2;
  const names = ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent","New Moon"];
  const thresholds = [22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5,361];
  let idx = thresholds.findIndex(t => elong < t);
  return { illumination: illum, phaseName: names[idx], elongation: elong, moonRA: moon.ra, moonDec: moon.dec };
}

const R_EQ2GAL = [
  -0.0548755604, -0.8734370902, -0.4838350155,
   0.4941094279, -0.4448296300,  0.7469822445,
  -0.8676661490, -0.1980763734,  0.4559837762
];

function mat3Multiply(A, B) {
  const r = new Float32Array(9);
  for (let i = 0; i < 3; i++) {
    for (let j = 0; j < 3; j++) {
      r[i * 3 + j] = A[i * 3] * B[j] + A[i * 3 + 1] * B[3 + j] + A[i * 3 + 2] * B[6 + j];
    }
  }
  return r;
}

function buildViewToGalMatrix(centerAlt, centerAz, latDeg, lonDeg, jd) {
  const lst = (gmst(jd) + lonDeg + 360) % 360;
  const lstR = lst * DEG;
  const latR = latDeg * DEG;
  const sinLst = Math.sin(lstR), cosLst = Math.cos(lstR);
  const sinLat = Math.sin(latR), cosLat = Math.cos(latR);

  const R_enu2eq = [
    -sinLst, -sinLat * cosLst, cosLat * cosLst,
     cosLst, -sinLat * sinLst, cosLat * sinLst,
     0,       cosLat,          sinLat
  ];

  const a0 = centerAlt * DEG, az0 = centerAz * DEG;
  const sinA = Math.sin(a0), cosA = Math.cos(a0);
  const sinAz = Math.sin(az0), cosAz = Math.cos(az0);

  const R_cam2enu = [
    cosAz,  -sinA * sinAz,  cosA * sinAz,
   -sinAz,  -sinA * cosAz,  cosA * cosAz,
    0,       cosA,          sinA
  ];

  const R_enu2gal = mat3Multiply(R_EQ2GAL, R_enu2eq);
  return mat3Multiply(R_enu2gal, R_cam2enu);
}

function buildCamToENUMatrix(centerAlt, centerAz) {
  const a0 = centerAlt * DEG, az0 = centerAz * DEG;
  const sinA = Math.sin(a0), cosA = Math.cos(a0);
  const sinAz = Math.sin(az0), cosAz = Math.cos(az0);
  return [
    cosAz,  -sinA * sinAz,  cosA * sinAz,
   -sinAz,  -sinA * cosAz,  cosA * cosAz,
    0,       cosA,          sinA
  ];
}

const glCanvas = document.getElementById('glCanvas');
const gl = glCanvas.getContext('webgl', { antialias: true, alpha: false });

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compileShader(document.getElementById('vs').textContent, gl.VERTEX_SHADER);
const fs = compileShader(document.getElementById('fs').textContent, gl.FRAGMENT_SHADER);
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error('Program link error:', gl.getProgramInfoLog(program));
}
gl.useProgram(program);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(program, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uSkyTex = gl.getUniformLocation(program, 'uSkyTex');
const uViewToGal = gl.getUniformLocation(program, 'uViewToGal');
const uFovTan = gl.getUniformLocation(program, 'uFovTan');
const uAspect = gl.getUniformLocation(program, 'uAspect');
const uGamma = gl.getUniformLocation(program, 'uGamma');

const uCamToENU = gl.getUniformLocation(program, 'uCamToENU');

const skyTexture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, skyTexture);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0,0,0,255]));
let textureLoaded = false;

const skyImage = new Image();
skyImage.onload = () => {
  console.log('sky texture loaded OK');
  gl.bindTexture(gl.TEXTURE_2D, skyTexture);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, skyImage);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  textureLoaded = true;
  document.getElementById('loadingMsg').style.display = 'none';
  updateSky();
};
skyImage.onerror = (e) => {

const overlay = document.getElementById('overlayCanvas');
const ctx = overlay.getContext('2d');

let computedStars = [];
let computedMoon = null;
let currentMoonPhase = null;
let currentJD = 0;

const view = { centerAlt: 45, centerAz: 180, fov: 90, cx: 0, cy: 0, radius: 0 };

function project(altDeg, azDeg) {
  const a = altDeg * DEG, az = azDeg * DEG;
  const ca0 = view.centerAlt * DEG, az0 = view.centerAz * DEG;
  const cosA = Math.cos(a), sinA = Math.sin(a), cosAz = Math.cos(az), sinAz = Math.sin(az);
  const cosC = Math.cos(ca0), sinC = Math.sin(ca0), cosAz0 = Math.cos(az0), sinAz0 = Math.sin(az0);

  const x = cosA * sinAz, y = cosA * cosAz, z = sinA;
  const cx0 = cosC * sinAz0, cy0 = cosC * cosAz0, cz0 = sinC;
  const rx = cosAz0, ry = -sinAz0;
  const ux = -sinC * sinAz0, uy = -sinC * cosAz0, uz = cosC;

  const d = x * cx0 + y * cy0 + z * cz0;
  if (d <= 0.01) return null;

  const scale = view.radius / Math.tan(view.fov / 2 * DEG);
  const px = (x * rx + y * ry) / d * scale;
  const py = -(x * ux + y * uy + z * uz) / d * scale;
  if (Math.abs(px) > view.radius * 1.15 || Math.abs(py) > view.radius * 1.15) return null;
  return { x: view.cx + px, y: view.cy + py };
}

function computePositions() {
  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  const dateStr = document.getElementById('dateInput').value;
  const timeStr = document.getElementById('timeInput').value;
  if (!dateStr || !timeStr) return;

  const dt = new Date(dateStr + 'T' + timeStr);
  const utH = dt.getUTCHours() + dt.getUTCMinutes() / 60 + dt.getUTCSeconds() / 3600;
  currentJD = julianDate(dt.getUTCFullYear(), dt.getUTCMonth() + 1, dt.getUTCDate(), utH);

  computedStars = [];
  for (const s of FULL_CATALOG) {
    const p = raDecToAltAz(s[0], s[1], lat, lon, currentJD);
    if (p.alt < -2) continue;
    const am = atmosphericExtinction(p.alt, s[2]);
    if (am > 7.5) continue;
    computedStars.push({
      alt: p.alt,
      az: p.az,
      mag: s[2],
      appMag: am,
      bv: s[3],
      name: s[4],
      ra: s[0],
      dec: s[1]
    });
  }

  const moon = moonPosition(currentJD);
  const mp = raDecToAltAz(moon.ra, moon.dec, lat, lon, currentJD);
  computedMoon = { ...mp, ...moon };
  currentMoonPhase = moonPhaseInfo(currentJD);
  updateMoonPanel();
}

function updateMoonPanel() {
  const el = document.getElementById('moonInfo');
  if (!currentMoonPhase || !computedMoon) {
    el.textContent = 'N/A';
    return;
  }
  const icons = {
    'New Moon':'🌑','Waxing Crescent':'🌒','First Quarter':'🌓','Waxing Gibbous':'🌔',
    'Full Moon':'🌕','Waning Gibbous':'🌖','Last Quarter':'🌗','Waning Crescent':'🌘'
  };
  const ic = icons[currentMoonPhase.phaseName] || '';
  const il = (currentMoonPhase.illumination * 100).toFixed(1);
  const pos = computedMoon.alt > 0
    ? `Alt ${computedMoon.alt.toFixed(1)}° Az ${computedMoon.az.toFixed(1)}°`
    : 'Below horizon';
  el.innerHTML = `<span class="phase-icon">${ic}</span><b>${currentMoonPhase.phaseName}</b><br>Illumination: ${il}%<br>${pos}`;
}

function resizeCanvases() {
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  glCanvas.width = w * dpr;
  glCanvas.height = h * dpr;
  overlay.width = w * dpr;
  overlay.height = h * dpr;
  gl.viewport(0, 0, glCanvas.width, glCanvas.height);
  view.cx = w / 2;
  view.cy = h / 2;
  view.radius = Math.min(w, h) / 2 * 0.95;
}

function renderBackground() {
  if (!textureLoaded) return;
  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  const gamma = +document.getElementById('gammaSlider').value;
  const lp = +document.getElementById('lpSlider').value;
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;

  const M = buildViewToGalMatrix(view.centerAlt, view.centerAz, lat, lon, currentJD);

  gl.useProgram(program);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, skyTexture);
  gl.uniform1i(uSkyTex, 0);

  gl.uniformMatrix3fv(uViewToGal, false, [
    M[0], M[3], M[6],
    M[1], M[4], M[7],
    M[2], M[5], M[8]
  ]);

  gl.uniform1f(uFovTan, Math.tan(view.fov / 2 * DEG));
  gl.uniform1f(uAspect, w / h);
  gl.uniform1f(uGamma, gamma);
  gl.uniform1f(uLightPollution, lp);

  const C2E = buildCamToENUMatrix(view.centerAlt, view.centerAz);
  gl.uniformMatrix3fv(uCamToENU, false, [
    C2E[0], C2E[3], C2E[6],
    C2E[1], C2E[4], C2E[7],
    C2E[2], C2E[5], C2E[8]
  ]);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// Improved B-V to RGB using Ballesteros' formula approximation
// Gives more photographic star colors
function bvToRGB(bv) {
  bv = Math.max(-0.4, Math.min(2.0, bv));
  // Temperature from B-V (Ballesteros 2012)
  const T = 4600 * (1 / (0.92 * bv + 1.7) + 1 / (0.92 * bv + 0.62));
  // Planckian locus approximation to sRGB
  let r, g, b;
  const t = T / 100;
  // Red
  if (t <= 66) r = 1.0;
  else { r = 1.292936 * Math.pow(t - 60, -0.1332047592); r = Math.max(0, Math.min(1, r)); }
  // Green
  if (t <= 66) { g = 0.39008158 * Math.log(t) - 0.63184144; }
  else { g = 1.129891 * Math.pow(t - 60, -0.0755148492); }
  g = Math.max(0, Math.min(1, g));
  // Blue
  if (t >= 66) b = 1.0;
  else if (t <= 19) b = 0;
  else { b = 0.54320679 * Math.log(t - 10) - 1.19625409; b = Math.max(0, Math.min(1, b)); }
  // Desaturate slightly toward white for realism (stars look less saturated to eye)
  const desat = 0.25;
  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  r = r * (1 - desat) + lum * desat;
  g = g * (1 - desat) + lum * desat;
  b = b * (1 - desat) + lum * desat;
  return [Math.min(1, r), Math.min(1, g), Math.min(1, b)];
}

// Scintillation: subtle brightness variation based on position hash + time
let twinkleTime = 0;
function scintillation(x, y, mag) {
  // Brighter stars twinkle less, faint stars twinkle more
  // Low altitude = more twinkle
  const phase = Math.sin(twinkleTime * 3.7 + x * 127.1 + y * 311.7) *
                Math.sin(twinkleTime * 5.3 + x * 269.5 + y * 183.3);
  const amount = Math.min(0.3, 0.05 + mag * 0.03);
  return 1.0 + phase * amount;
}

// Draw diffraction spikes for very bright stars
function drawSpikes(ctx, x, y, radius, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.6;
  const len = radius * 5;
  // 4-point cross pattern (from telescope optics)
  for (let angle = 0; angle < 4; angle++) {
    const a = angle * PI / 2 + PI / 4; // rotated 45°
    ctx.beginPath();
    ctx.moveTo(x - Math.cos(a) * len, y - Math.sin(a) * len);
    ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
    ctx.stroke();
  }
  ctx.restore();
}

function renderOverlay() {
  const wrap = document.getElementById('canvasWrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const showConst = document.getElementById('showConst').checked;
  const showLabels = document.getElementById('showLabels').checked;
  const showGrid = document.getElementById('showGrid').checked;
  const lp = +document.getElementById('lpSlider').value;
  const mLim = limitingMagnitude(lp);

  if (showGrid) {
    ctx.strokeStyle = 'rgba(60,70,100,0.2)';
    ctx.lineWidth = 0.5;
    for (let alt = 0; alt <= 90; alt += 15) {
      ctx.beginPath();
      let first = true;
      for (let az = 0; az <= 360; az += 2) {
        const p = project(alt, az);
        if (!p) { first = true; continue; }
        if (first) { ctx.moveTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    for (let az = 0; az < 360; az += 30) {
      ctx.beginPath();
      let first = true;
      for (let alt = 0; alt <= 90; alt += 2) {
        const p = project(alt, az);
        if (!p) { first = true; continue; }
        if (first) { ctx.moveTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }

  if (showConst) {
    ctx.strokeStyle = `rgba(70,100,160,${0.18 * (1.0 - lp * 0.6)})`;
    ctx.lineWidth = 0.6;
    for (const [name, lines] of Object.entries(CONST_LINES)) {
      let sx = 0, sy = 0, sc = 0;
      for (const [n1, n2] of lines) {
        const s1 = computedStars.find(s => s.name === n1);
        const s2 = computedStars.find(s => s.name === n2);
        if (!s1 || !s2 || s1.alt < 0 || s2.alt < 0) continue;
        const p1 = project(s1.alt, s1.az);
        const p2 = project(s2.alt, s2.az);
        if (!p1 || !p2) continue;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
        sx += p1.x + p2.x;
        sy += p1.y + p2.y;
        sc += 2;
      }
      if (showLabels && sc > 0) {
        ctx.fillStyle = `rgba(80,110,170,${0.18 * (1.0 - lp * 0.5)})`;
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(name, sx / sc, sy / sc - 8);
      }
    }
  }

  ctx.strokeStyle = 'rgba(60,80,50,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  let hf = true;
  for (let az = 0; az <= 361; az++) {
    const p = project(0, az % 360);
    if (!p) { hf = true; continue; }
    if (hf) { ctx.moveTo(p.x, p.y); hf = false; }
    else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Update scintillation time
  twinkleTime = Date.now() * 0.001;

  for (const star of computedStars) {
    if (star.alt < 0) continue;

    const visFactor = starVisibilityFactor(star.alt, lp);
    const effectiveMag = star.appMag + (1.0 - visFactor) * 2.0 + lp * 0.20;
    if (effectiveMag > mLim) continue;

    const p = project(star.alt, star.az);
    if (!p) continue;

    const am = effectiveMag;
    const isNamed = !!star.name;
    const [cr, cg, cb] = bvToRGB(star.bv);

    // Scintillation (atmospheric twinkle)
    const twinkle = scintillation(p.x, p.y, am);

    // Brightness: logarithmic flux mapping
    const rawBright = Math.pow(10, -0.4 * (am - 6.5)) * twinkle;
    const bright = Math.max(0.03, Math.min(1.0, rawBright * 0.15 * (1.0 - lp * 0.25)));

    // Size: brighter = bigger, with proper magnitude scaling
    const coreSize = Math.max(0.3, 2.8 * Math.pow(bright, 0.45));

    // === Outer glow (soft halo visible on bright stars) ===
    if (am < 3.5 && lp < 0.8) {
      const glowR = coreSize * (4.0 + (3.5 - am) * 1.2) * (1.0 - lp * 0.5);
      const glowAlpha = bright * Math.max(0.03, 0.18 - lp * 0.08);
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      grd.addColorStop(0, `rgba(${cr*255|0},${cg*255|0},${cb*255|0},${glowAlpha})`);
      grd.addColorStop(0.3, `rgba(${cr*255|0},${cg*255|0},${cb*255|0},${glowAlpha * 0.3})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowR, 0, TAU);
      ctx.fill();
    }

    // === Diffraction spikes for very bright stars (mag < 1.0) ===
    if (am < 1.0 && lp < 0.6) {
      const spikeAlpha = Math.min(0.35, (1.0 - am) * 0.15) * (1.0 - lp);
      const spikeColor = `rgba(${(cr*0.7+0.3)*255|0},${(cg*0.7+0.3)*255|0},${(cb*0.7+0.3)*255|0},1)`;
      drawSpikes(ctx, p.x, p.y, coreSize, spikeColor, spikeAlpha);
    }

    // === Star core: white-hot center with color fringe ===
    // Inner bright core (nearly white for bright stars, colored for faint)
    const whiteness = Math.min(0.8, bright * 1.5);
    const ir = cr * (1 - whiteness) + whiteness;
    const ig = cg * (1 - whiteness) + whiteness;
    const ib = cb * (1 - whiteness) + whiteness;
    ctx.fillStyle = `rgba(${ir*bright*255|0},${ig*bright*255|0},${ib*bright*255|0},${Math.min(1, bright + 0.15)})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, coreSize, 0, TAU);
    ctx.fill();

    // === Star labels ===
    if (showLabels && star.name && effectiveMag < 2.5) {
      const labelAlpha = Math.min(0.65, bright * 0.7);
      ctx.fillStyle = `rgba(180,200,230,${labelAlpha})`;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(star.name, p.x + coreSize + 3, p.y + 3);
    }
  }

  if (computedMoon && computedMoon.alt > -1 && currentMoonPhase) {
    const p = project(computedMoon.alt, computedMoon.az);
    if (p) {
      const mr = Math.max(8, 16 - view.fov * 0.07);
      const il = currentMoonPhase.illumination;
      const el = currentMoonPhase.elongation;
      const gr = mr * 4;
      const grd = ctx.createRadialGradient(p.x, p.y, mr * 0.3, p.x, p.y, gr);
      grd.addColorStop(0, `rgba(200,215,240,${il * 0.25})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, gr, 0, TAU);
      ctx.fill();
      ctx.fillStyle = '#1a1a28';
      ctx.beginPath();
      ctx.arc(p.x, p.y, mr, 0, TAU);
      ctx.fill();
      if (il > 0.01) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, mr, 0, TAU);
        ctx.clip();
        ctx.fillStyle = `rgb(${200 + il * 55 | 0}, ${210 + il * 45 | 0}, ${220 + il * 35 | 0})`;
        const tX = mr * Math.cos(el * DEG);
        ctx.beginPath();
        if (el < 180) {
          ctx.arc(p.x, p.y, mr, -PI / 2, PI / 2, false);
          ctx.ellipse(p.x, p.y, Math.abs(tX), mr, 0, PI / 2, -PI / 2, tX > 0);
        } else {
          ctx.arc(p.x, p.y, mr, PI / 2, -PI / 2, false);
          ctx.ellipse(p.x, p.y, Math.abs(tX), mr, 0, -PI / 2, PI / 2, tX > 0);
        }
        ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = 'rgba(200,215,240,0.5)';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Moon', p.x, p.y + mr + 14);
    }
  }

  const dirs = [[0,'N'],[45,'NE'],[90,'E'],[135,'SE'],[180,'S'],[225,'SW'],[270,'W'],[315,'NW']];
  for (const [az, label] of dirs) {
    const p = project(0, az);
    if (!p) continue;
    const main = label.length === 1;
    ctx.fillStyle = main ? 'rgba(200,180,100,0.65)' : 'rgba(150,140,80,0.35)';
    ctx.font = main ? 'bold 13px sans-serif' : '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, p.x, p.y + (main ? 20 : 16));
  }

  const dirN = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const di = Math.round(view.centerAz / 22.5) % 16;
  document.getElementById('viewInfo').innerHTML = `Looking: ${dirN[di]} (${view.centerAz.toFixed(0)}°)<br>Alt: ${view.centerAlt.toFixed(0)}° | FOV: ${view.fov.toFixed(0)}°`;
}

function renderAll() {
  renderBackground();
  renderOverlay();
}

// Subtle twinkle animation loop (redraws overlay at ~12fps for scintillation)
let twinkleAnim = null;
function startTwinkle() {
  if (twinkleAnim) return;
  let lastFrame = 0;
  function tick(ts) {
    if (ts - lastFrame > 80) { // ~12fps for subtle effect
      renderOverlay();
      lastFrame = ts;
    }
    twinkleAnim = requestAnimationFrame(tick);
  }
  twinkleAnim = requestAnimationFrame(tick);
}
function stopTwinkle() {
  if (twinkleAnim) { cancelAnimationFrame(twinkleAnim); twinkleAnim = null; }
}

function updateSky() {
  computePositions();
  renderAll();
  startTwinkle();
}

let dragging = false, dragSX, dragSY, dragAz0, dragAlt0;
overlay.addEventListener('mousedown', e => {
  dragging = true;
  dragSX = e.clientX;
  dragSY = e.clientY;
  dragAz0 = view.centerAz;
  dragAlt0 = view.centerAlt;
  overlay.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const sens = view.fov / view.radius;
  view.centerAz = ((dragAz0 - (e.clientX - dragSX) * sens) + 360) % 360;
  view.centerAlt = Math.max(-5, Math.min(90, dragAlt0 + (e.clientY - dragSY) * sens));
  renderAll();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  overlay.style.cursor = 'grab';
});
overlay.addEventListener('wheel', e => {
  e.preventDefault();
  view.fov = Math.max(10, Math.min(150, view.fov + e.deltaY * 0.05));
  renderAll();
}, { passive: false });
overlay.style.cursor = 'grab';

overlay.addEventListener('mousemove', e => {
  if (dragging) return;
  const rect = overlay.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const tt = document.getElementById('tooltip');
  let best = null, bd = 15;
  const lp = +document.getElementById('lpSlider').value;
  for (const s of computedStars) {
    if (!s.name || s.alt < 0) continue;
    const eff = s.appMag + (1.0 - starVisibilityFactor(s.alt, lp)) * 3.0 + lp * 0.35;
    const p = project(s.alt, s.az);
    if (!p) continue;
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < bd) { best = { ...s, effectiveMag: eff }; bd = d; }
  }
  if (best) {
    tt.style.display = 'block';
    tt.style.left = (mx + 15) + 'px';
    tt.style.top = (my - 10) + 'px';
    tt.innerHTML = `<b>${best.name}</b><br>Mag ${best.mag.toFixed(2)} | App ${best.effectiveMag.toFixed(2)}<br>Alt ${best.alt.toFixed(1)}° Az ${best.az.toFixed(1)}°`;
  } else {
    tt.style.display = 'none';
  }
});

// === City autocomplete ===
const cityInput = document.getElementById('cityInput');
const sugBox = document.getElementById('citySuggestions');
let sgIdx = -1;

function updateCoordDisplay() {
  const lat = +document.getElementById('lat').value;
  const lon = +document.getElementById('lon').value;
  document.getElementById('coordDisplay').textContent = `${Math.abs(lat).toFixed(2)}°${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon).toFixed(2)}°${lon >= 0 ? 'E' : 'W'}`;
}
updateCoordDisplay();

// Major world cities get a search ranking bonus (population-based)
// Key: "city|country" for disambiguation of same-name cities
const MAJOR_CITIES = new Map([
  ['tokyo|JP',15],['new york|US',15],['london|GB',15],['paris|FR',15],
  ['beijing|CN',15],['shanghai|CN',15],['mumbai|IN',15],['delhi|IN',15],
  ['new delhi|IN',15],['seoul|KR',15],['mexico city|MX',15],['cairo|EG',15],
  ['moscow|RU',15],['istanbul|TR',15],['buenos aires|AR',15],['lagos|NG',15],
  ['rio de janeiro|BR',15],['los angeles|US',15],['chicago|US',15],
  ['sydney|AU',15],['melbourne|AU',12],['toronto|CA',15],['berlin|DE',15],
  ['madrid|ES',15],['rome|IT',15],['bangkok|TH',15],['jakarta|ID',15],
  ['lima|PE',12],['bogota|CO',12],['tehran|IR',12],['hong kong|HK',15],
  ['singapore|SG',15],['dubai|AE',12],['washington|US',12],
  ['san francisco|US',12],['boston|US',10],['seattle|US',10],['miami|US',10],
  ['houston|US',10],['dallas|US',10],['philadelphia|US',10],['atlanta|US',10],
  ['denver|US',10],['phoenix|US',10],['detroit|US',10],['las vegas|US',10],
  ['austin|US',10],['san diego|US',10],['portland|US',10],
  ['amsterdam|NL',12],['vienna|AT',12],['prague|CZ',12],['barcelona|ES',12],
  ['lisbon|PT',12],['stockholm|SE',12],['oslo|NO',12],['copenhagen|DK',12],
  ['helsinki|FI',12],['warsaw|PL',12],['budapest|HU',12],['athens|GR',12],
  ['dublin|IE',12],['zurich|CH',12],['brussels|BE',12],['montreal|CA',10],
  ['vancouver|CA',10],['ottawa|CA',10],['cape town|ZA',12],['perth|AU',10],
  ['brisbane|AU',10],['auckland|NZ',12],['wellington|NZ',10],['taipei|TW',12],
  ['osaka|JP',10],['kyoto|JP',10],['nairobi|KE',12],['johannesburg|ZA',12],
  ['sao paulo|BR',15],['bangalore|IN',10],['chennai|IN',10],['kolkata|IN',12],
  ['manila|PH',12],['hanoi|VN',12],['kuala lumpur|MY',12],
  ['santiago|CL',12],['havana|CU',12],['accra|GH',10],['dakar|SN',10],
]);

function searchCities(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase().trim();
  const parts = q.split(/[,\s]+/).filter(Boolean);
  const results = [];

  for (const c of CITY_DB) {
    const [city, region, country, lat, lon] = c;
    const cl = city.toLowerCase();
    const rl = region.toLowerCase();
    const cntl = country.toLowerCase();

    let score = 0;
    if (parts.length === 1) {
      if (cl === q) score = 100;
      else if (cl.startsWith(q)) score = 80;
      else if (cl.includes(q)) score = 40;
      else continue;
    } else {
      const cityMatch = cl.startsWith(parts[0]) || cl.includes(parts[0]);
      const lastPart = parts[parts.length - 1];
      const regionMatch = rl.startsWith(lastPart) || cntl === lastPart;
      const joinedCity = parts.slice(0, -1).join(' ');
      const joinedMatch = cl.startsWith(joinedCity) || cl === joinedCity;
      const fullMatch = cl.startsWith(q) || cl === q;

      if (fullMatch) score = 90;
      else if (joinedMatch && regionMatch) score = 85;
      else if (cityMatch && regionMatch) score = 70;
      else if (cityMatch) score = 30;
      else continue;
    }
    // Bonus for major world cities (keyed by "city|country")
    const majorBonus = MAJOR_CITIES.get(cl + '|' + country);
    if (majorBonus) score += majorBonus;
    results.push({ city, region, country, lat, lon, score });
    if (results.length > 50) break;
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 8);
}

function renderSuggestions(results) {
  if (results.length === 0) {
    sugBox.style.display = 'none';
    return;
  }
  sgIdx = -1;
  sugBox.innerHTML = results.map((r, i) =>
    `<div class="sg-item" data-idx="${i}">${r.city} <span class="sg-region">${r.region ? r.region + ', ' : ''}${r.country}</span></div>`
  ).join('');
  sugBox.style.display = 'block';

  // Click handlers
  sugBox.querySelectorAll('.sg-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectCity(results[+el.dataset.idx]);
    });
  });
}

function selectCity(r) {
  document.getElementById('lat').value = r.lat;
  document.getElementById('lon').value = r.lon;
  cityInput.value = `${r.city}${r.region ? ', ' + r.region : ''}, ${r.country}`;
  sugBox.style.display = 'none';
  updateCoordDisplay();
  updateSky();
}

cityInput.addEventListener('input', () => {
  const results = searchCities(cityInput.value);
  renderSuggestions(results);
});

cityInput.addEventListener('focus', () => {
  if (cityInput.value.length >= 2) {
    const results = searchCities(cityInput.value);
    renderSuggestions(results);
  }
});

cityInput.addEventListener('blur', () => {
  setTimeout(() => { sugBox.style.display = 'none'; }, 150);
});

cityInput.addEventListener('keydown', e => {
  const items = sugBox.querySelectorAll('.sg-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    sgIdx = Math.min(sgIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === sgIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    sgIdx = Math.max(sgIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === sgIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (sgIdx >= 0) {
      const results = searchCities(cityInput.value);
      if (results[sgIdx]) selectCity(results[sgIdx]);
    } else {
      // Select first result
      const results = searchCities(cityInput.value);
      if (results.length) selectCity(results[0]);
    }
  }
});

function useMyLocation() {
  if (!navigator.geolocation) {
    alert('Geolocation not supported');
    return;
  }
  navigator.geolocation.getCurrentPosition(p => {
    const lat = p.coords.latitude;
    const lon = p.coords.longitude;
    document.getElementById('lat').value = lat.toFixed(4);
    document.getElementById('lon').value = lon.toFixed(4);
    // Try to find nearest city
    let best = null, bestDist = Infinity;
    for (const c of CITY_DB) {
      const d = Math.pow(c[3] - lat, 2) + Math.pow(c[4] - lon, 2);
      if (d < bestDist) { bestDist = d; best = c; }
    }
    if (best && bestDist < 4) { // within ~2 degrees
      cityInput.value = `${best[0]}${best[1] ? ', ' + best[1] : ''}, ${best[2]}`;
    } else {
      cityInput.value = `${lat.toFixed(2)}°${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon).toFixed(2)}°${lon >= 0 ? 'E' : 'W'}`;
    }
    updateCoordDisplay();
    updateSky();
  }, () => alert('Could not get location'));
}

function useNow() {
  const n = new Date();
  document.getElementById('dateInput').value = n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0');
  document.getElementById('timeInput').value = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  updateSky();
}

['dateInput','timeInput'].forEach(id => {
  document.getElementById(id).addEventListener('change', updateSky);
});

function init() {
  useNow();
  resizeCanvases();
  window.addEventListener('resize', () => {
    resizeCanvases();
    renderAll();
  });
  updateSky();
}

init();
